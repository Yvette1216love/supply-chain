<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 硬體供應鏈控制台 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--bg-app:#030d1e;
--bg:#060c18;
--text:#cbd5e1;
--bright:#f1f5f9;
--dim:#475569;
--line:#16243d;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
height:100vh; height:100dvh;
background:var(--bg-app); color:var(--text);
font-family:"IBM Plex Sans",sans-serif;
display:flex; flex-direction:column; overflow:hidden;
}
header.hdr{
flex:0 0 auto; display:flex; align-items:center; gap:12px;
height:52px; padding:0 18px;
background:var(--bg-app);
border-bottom:2px solid var(--line);
transition:border-color .2s;
}
.hdr-mark{font-size:15px;color:var(--dim);}
.hdr-title{font-size:14px; font-weight:600; color:var(--bright);}
.hdr-title small{
display:inline-block; margin-left:8px;
font-family:"IBM Plex Mono",monospace; font-weight:400;
font-size:11px; color:var(--dim); letter-spacing:.4px;
}
.hdr-spacer{flex:1;}
.hdr-count{font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--dim);}
nav#tabs{
flex:0 0 auto; display:flex; gap:2px; padding:0 10px;
background:var(--bg-app); border-bottom:1px solid var(--line);
overflow-x:auto; scrollbar-width:none;
}
nav#tabs::-webkit-scrollbar{display:none;}
.tab{
display:flex; align-items:center; gap:7px;
padding:11px 14px; cursor:pointer; white-space:nowrap;
background:none; border:none; border-bottom:2px solid transparent;
color:var(--dim); font-family:"IBM Plex Sans",sans-serif; font-size:13px;
transition:color .15s, border-color .15s;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--bright); border-bottom-color:var(--accent);}
.tab .dot{width:7px; height:7px; border-radius:1px; background:var(--accent); flex:0 0 auto;}
.tab .sub{
font-family:"IBM Plex Mono",monospace; font-size:10px; color:var(--dim); opacity:.8;
}
main{flex:1; position:relative; min-height:0;}
.pane{position:absolute; inset:0; display:none;}
.pane.active{display:block;}
.pane iframe{width:100%; height:100%; border:0; display:block; background:var(--bg);}
.frame-tools{position:absolute; top:10px; right:14px; z-index:5; display:flex; gap:8px;}
.frame-tools a, .frame-tools button{
font-family:"IBM Plex Mono",monospace; font-size:10px; color:var(--dim);
background:rgba(6,12,24,.75); border:1px solid var(--line);
padding:5px 9px; border-radius:4px; text-decoration:none; cursor:pointer;
backdrop-filter:blur(4px);
}
.frame-tools a:hover, .frame-tools button:hover{color:var(--bright); border-color:var(--dim);}
.state-layer{
position:absolute; inset:0; z-index:4;
display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
background:var(--bg); transition:opacity .25s;
}
.state-layer.hidden{opacity:0; pointer-events:none;}
.spinner{
width:26px; height:26px; border-radius:50%;
border:2px solid var(--line); border-top:2px solid var(--accent);
animation:spin .9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.state-label{font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--dim);}
.state-warn{display:none; flex-direction:column; align-items:center; gap:10px; max-width:300px; text-align:center;}
.state-warn p{margin:0; font-size:12px; line-height:1.6; color:var(--text);}
.state-warn a{
font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--bright);
border:1px solid var(--line); padding:6px 14px; border-radius:4px; text-decoration:none;
}
.state-warn a:hover{border-color:var(--dim);}
@media (max-width:640px){
.hdr-title small{display:none;}
.hdr-count{display:none;}
.tab{padding:10px 11px; font-size:12px;}
.tab .sub{display:none;}
}
</style>
</head>
